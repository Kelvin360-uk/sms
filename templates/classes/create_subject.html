{% extends 'base.html' %}
{% block title %}Add Subject{% endblock %}
{% block content %}
<div class="page-header"><div><h1>Add Subject</h1></div></div>
<div class="panel" style="max-width: 600px;"><form method="post">{% csrf_token %}
    <div class="form-row">
        <div><label>Code *</label><input name="code" required></div>
        <div><label>Name *</label><input name="name" required></div>
    </div>
    <label>Description</label><textarea name="description"></textarea>
    <div style="margin-top: 1rem;">
        <button type="submit" class="btn">Create</button>
        <a href="{% url 'subject_list' %}" class="btn btn-secondary">Cancel</a>
    </div>
</form></div>
{% endblock %}

{% extends 'base.html' %}
{% block title %}Create Class{% endblock %}
{% block content %}
<div class="page-header"><div><p class="eyebrow">New</p><h1>Create Class</h1></div></div>
<div class="panel" style="max-width: 600px;">
<form method="post">{% csrf_token %}
    <label>Class Name *</label><input name="name" required placeholder="e.g. Form 1A">
    <div class="form-row" style="margin-top: 1rem;">
        <div><label>Grade Level *</label><input type="number" name="grade_level" required></div>
        <div><label>Section</label><input name="section" placeholder="A, B, C..."></div>
    </div>
    <label>Academic Year *</label><input name="academic_year" required value="{{ academic_year }}">
    <div style="margin-top: 1rem;">
        <button type="submit" class="btn">Create</button>
        <a href="{% url 'class_list' %}" class="btn btn-secondary">Cancel</a>
    </div>
</form></div>
{% endblock %}

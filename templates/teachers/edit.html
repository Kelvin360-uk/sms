{% extends 'base.html' %}
{% block title %}Edit {{ teacher.full_name }}{% endblock %}
{% block content %}
<div class="page-header"><div><p class="eyebrow">Edit</p><h1>{{ teacher.full_name }}</h1></div></div>
<div class="panel"><form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="form-row">
        <div><label>Full Name</label><input name="full_name" value="{{ teacher.full_name }}" required></div>
        <div><label>Email</label><input type="email" name="email" value="{{ teacher.email }}" required></div>
    </div>
    <div class="form-row">
        <div><label>Phone</label><input name="phone" value="{{ teacher.phone }}" required></div>
        <div><label>Residence</label><input name="residence" value="{{ teacher.residence }}" required></div>
    </div>
    <div class="form-row">
        <div><label>Staff Type</label><select name="staff_type">
            <option value="TEACHING" {% if teacher.staff_type == 'TEACHING' %}selected{% endif %}>Teaching</option>
            <option value="NON_TEACHING" {% if teacher.staff_type == 'NON_TEACHING' %}selected{% endif %}>Non-Teaching</option>
        </select></div>
        <div><label><input type="checkbox" name="is_class_teacher" {% if teacher.is_class_teacher %}checked{% endif %}> Class Teacher</label></div>
        <div><label>Assigned Class</label>
            <select name="assigned_class"><option value="">—</option>
                {% for c in classes %}<option value="{{ c.id }}" {% if c.id == teacher.assigned_class_id %}selected{% endif %}>{{ c.name }}</option>{% endfor %}
            </select>
        </div>
    </div>
    <div class="form-row">
        <div><label>Subjects</label><select name="subjects" multiple size="5">
            {% for s in subjects %}<option value="{{ s.id }}" {% if s in teacher.subjects_taught.all %}selected{% endif %}>{{ s.code }}</option>{% endfor %}
        </select></div>
        <div><label>Classes Taught</label><select name="classes" multiple size="5">
            {% for c in classes %}<option value="{{ c.id }}" {% if c in teacher.classes_taught.all %}selected{% endif %}>{{ c.name }}</option>{% endfor %}
        </select></div>
    </div>
    <button type="submit" class="btn">Save</button>
    <a href="{% url 'teacher_detail' teacher.id %}" class="btn btn-secondary">Cancel</a>
</form></div>
{% endblock %}

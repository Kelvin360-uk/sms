{% extends 'base.html' %}
{% block title %}Edit Payment{% endblock %}
{% block content %}
<div class="page-header"><div><h1>Edit Payment</h1>
    <p class="subtitle">You can edit while pending. Once IT Admin approves, edits are not allowed — only reversals.</p></div></div>
<div class="panel" style="max-width: 600px;"><form method="post">{% csrf_token %}
    <div class="form-row">
        <div><label>Amount</label><input type="number" step="0.01" name="amount_paid" value="{{ payment.amount_paid }}" required></div>
        <div><label>Method</label><select name="payment_method">
            {% for k, v in payment.PAYMENT_METHODS %}<option value="{{ k }}" {% if payment.payment_method == k %}selected{% endif %}>{{ v }}</option>{% endfor %}
        </select></div>
    </div>
    <label>Transaction ID</label><input name="transaction_id" value="{{ payment.transaction_id }}">
    <label>Finance Notes</label><textarea name="finance_notes">{{ payment.finance_notes }}</textarea>
    <div style="margin-top: 1rem;">
        <button type="submit" class="btn">Save</button>
        <a href="{% url 'payment_detail' payment.id %}" class="btn btn-secondary">Cancel</a>
    </div>
</form></div>
{% endblock %}
